<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="This site is currently in production. Coming soon." />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:        #060607;
      --ink-soft:   #101012;
      --bone:       #f5f1e8;
      --bone-dim:   #b9b4a8;
      --muted:      #6e6b63;
      --gold:       #f7cf38;   /* sunbeam yellow */
      --gold-soft:  #fff0b0;   /* bright core */
      --gold-warm:  #f0c52c;   /* deeper edge of the beam */
      --rec:        #e5484d;
      --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --mono: ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100svh;
      background:
        radial-gradient(70% 50% at 50% 0%, #1b1a17 0%, rgba(10,9,8,0) 60%),
        radial-gradient(120% 100% at 50% 50%, #0c0b0b 0%, #050505 60%, #020202 100%);
      color: var(--bone);
      font-family: var(--serif);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sunbeam ──────────────────────────────────────────── */
    .glow {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
    }
    .glow::before {        /* the diagonal shaft of light */
      content: "";
      position: absolute;
      width: 34vmax;
      height: 160vmax;
      left: 50%; top: -56%;
      transform: translateX(-50%) rotate(-20deg);
      background: radial-gradient(closest-side ellipse,
        rgba(255,247,210,0.34) 0%,
        rgba(252,224,108,0.15) 30%,
        rgba(250,216,80,0.04) 56%,
        transparent 74%);
      filter: blur(36px);
      will-change: transform, opacity;
      animation: beam 12s ease-in-out infinite;
    }
    .glow::after {         /* faint bloom where the light lands */
      content: "";
      position: absolute;
      width: 56vmax; height: 56vmax;
      left: 16%; bottom: -32%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(252,224,108,0.1) 0%, rgba(252,224,108,0.03) 42%, transparent 72%);
      filter: blur(80px);
      will-change: transform, opacity;
      animation: bloom 16s ease-in-out infinite;
    }

    @keyframes beam {
      0%, 100% { transform: translateX(-50%) rotate(-19deg) scaleX(1);    opacity: .8; }
      50%      { transform: translateX(-46%) rotate(-15deg) scaleX(1.12); opacity: 1; }
    }
    @keyframes bloom {
      0%, 100% { transform: translate(0, 0)       scale(1); }
      50%      { transform: translate(6vw, -3vh)  scale(1.18); }
    }

    /* ── Film grain ───────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: -150%;
      width: 400%; height: 400%;
      pointer-events: none;
      z-index: 3;
      opacity: .05;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      animation: grain 1.1s steps(4) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3%, 2%); }
      50%  { transform: translate(2%, -3%); }
      75%  { transform: translate(-2%, -2%); }
      100% { transform: translate(3%, 1%); }
    }

    /* ── Vignette ─────────────────────────────────────────── */
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(120% 120% at 50% 42%, transparent 52%, rgba(0,0,0,.5) 86%, rgba(0,0,0,.78) 100%);
    }

    /* ── Stage ────────────────────────────────────────────── */
    .stage {
      position: relative;
      z-index: 4;
      width: min(680px, 90vw);
      text-align: center;
      padding: 2rem 0;
    }

    /* REC strip */
    .rec {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      font-family: var(--mono);
      font-size: .68rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--bone-dim);
      margin-bottom: 2.6rem;
      opacity: 0;
      animation: fade-in 1s ease 0.2s forwards;
    }
    .rec__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--rec);
      box-shadow: 0 0 10px rgba(229,72,77,.9), 0 0 22px rgba(229,72,77,.5);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .rec__tc { color: var(--bone); letter-spacing: .18em; }
    .rec__sep { color: var(--muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .25; transform: scale(.78); }
    }

    /* Clapperboard */
    .clapper {
      position: relative;
      width: 168px;
      margin: 0 auto 2.5rem;
      filter: drop-shadow(0 14px 30px rgba(0,0,0,.6));
    }
    .clapper::after {       /* sunlit halo behind it */
      content: "";
      position: absolute;
      inset: -55% -35%;
      background: radial-gradient(circle, rgba(250,219,96,.2) 0%, rgba(255,242,196,.08) 40%, transparent 70%);
      z-index: -1;
    }
    .stick {
      height: 22px;
      border-radius: 3px;
      background:
        repeating-linear-gradient(58deg,
          #f5f1e8 0 16px,
          #161416 16px 32px);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.3);
    }
    .stick--top {
      transform-origin: 8px bottom;
      animation: clap 4.6s cubic-bezier(.7,.05,.3,1) infinite;
    }
    .stick--gap { height: 4px; }
    .stick--bottom {
      background:
        repeating-linear-gradient(122deg,
          #f5f1e8 0 16px,
          #161416 16px 32px);
    }

    @keyframes clap {
      0%      { transform: rotate(-26deg); }
      8%      { transform: rotate(0deg); }
      12%     { transform: rotate(0deg) scaleY(.92); }
      16%     { transform: rotate(0deg) scaleY(1); }
      26%     { transform: rotate(-26deg); }
      100%    { transform: rotate(-26deg); }
    }

    /* Headline */
    .eyebrow {
      font-family: var(--mono);
      font-size: .64rem;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: fade-in 1s ease 0.5s forwards;
    }

    h1 {
      font-weight: 500;
      line-height: .98;
      font-size: clamp(2.9rem, 9vw, 5.4rem);
      letter-spacing: .01em;
    }
    h1 .line {
      display: block;
      overflow: hidden;
    }
    h1 .line > span {
      display: block;
      transform: translateY(110%);
      animation: rise 1.1s cubic-bezier(.16,1,.3,1) forwards;
    }
    h1 .line--1 > span { animation-delay: .55s; }
    h1 .line--2 > span { animation-delay: .68s; }
    h1 em {
      font-style: italic;
      color: var(--gold);
      text-shadow: 0 0 38px rgba(250,219,96,.34);
    }

    .rule {
      width: 0;
      height: 1px;
      margin: 1.8rem auto 1.6rem;
      background: linear-gradient(90deg, transparent, var(--gold-warm), var(--gold-soft), var(--gold-warm), transparent);
      animation: line-grow 1.4s ease 1s forwards;
      position: relative;
    }
    .rule::after {
      content: "";
      position: absolute;
      top: -1px; bottom: -1px;
      width: 40%;
      background: linear-gradient(90deg, transparent, rgba(255,231,155,.95), transparent);
      animation: shimmer 3.2s ease-in-out 2s infinite;
    }

    .tagline {
      font-size: clamp(1.05rem, 2.6vw, 1.4rem);
      font-style: italic;
      color: var(--bone);
      opacity: 0;
      animation: fade-in 1.1s ease 1.15s forwards;
    }
    .sub {
      margin-top: .9rem;
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fade-in 1.1s ease 1.35s forwards;
    }

    footer {
      position: fixed;
      left: 0; right: 0; bottom: 1.3rem;
      z-index: 4;
      text-align: center;
      font-family: var(--mono);
      font-size: .58rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(125,117,106,.65);
      opacity: 0;
      animation: fade-in 1.5s ease 1.8s forwards;
    }

    @keyframes fade-in   { to { opacity: 1; } }
    @keyframes rise      { to { transform: translateY(0); } }
    @keyframes line-grow { to { width: min(220px, 60%); } }
    @keyframes shimmer {
      0%   { left: -40%; opacity: 0; }
      15%  { opacity: 1; }
      60%  { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }

    /* ── Reduced motion ───────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .glow::before, .glow::after, .grain,
      .rec__dot, .stick--top, .rule::after { animation: none !important; }
      .grain { display: none; }
      .stick--top { transform: rotate(-12deg); }
      .rec, .eyebrow, .tagline, .sub, footer { opacity: 1; animation: none; }
      h1 .line > span { transform: none; animation: none; }
      .rule { width: min(220px, 60%); animation: none; }
    }

    @media (max-width: 480px) {
      .clapper { width: 134px; }
      .rec { letter-spacing: .2em; gap: .5rem; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="stage">
    <div class="rec" aria-hidden="true">
      <span class="rec__dot"></span>
      <span>REC</span>
      <span class="rec__sep">/</span>
      <span class="rec__tc" id="tc">00:00:00:00</span>
    </div>

    <div class="clapper" aria-hidden="true">
      <div class="stick stick--top"></div>
      <div class="stick stick--gap"></div>
      <div class="stick stick--bottom"></div>
    </div>

    <p class="eyebrow">In Production</p>

    <h1>
      <span class="line line--1"><span>Tiwa</span></span>
      <span class="line line--2"><span><em>Olatoye</em></span></span>
    </h1>

    <div class="rule" aria-hidden="true"></div>

    <p class="tagline">The set is being dressed.</p>
    <p class="sub">Portfolio &middot; Coming Soon</p>
  </main>

  <footer>&copy; 2026 Tiwa Olatoye</footer>

  <div class="grain" aria-hidden="true"></div>

  <script>
    // Cinematic timecode ticker (HH:MM:SS:FF @ 24fps)
    (function () {
      var el = document.getElementById('tc');
      if (!el) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var frames = 0;
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      function render() {
        var f  = frames % 24;
        var s  = Math.floor(frames / 24) % 60;
        var m  = Math.floor(frames / (24 * 60)) % 60;
        var h  = Math.floor(frames / (24 * 3600)) % 24;
        el.textContent = pad(h) + ':' + pad(m) + ':' + pad(s) + ':' + pad(f);
      }
      render();
      if (reduce) return;
      setInterval(function () { frames++; render(); }, 1000 / 24);
    })();
  </script>
</body>
</html>
